# ══════════════════════════════════════════════════════════════════════════════
# Fatwa API Gateway — Full Development Ecosystem
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: fatwa-postgres
    environment:
      POSTGRES_DB: fatwa_db
      POSTGRES_USER: fatwa
      POSTGRES_PASSWORD: fatwa_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fatwa -d fatwa_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 2. pgAdmin ───────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fatwa-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fatwa.ai
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── 3. Valkey (Redis-compatible) ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:8.1
    container_name: fatwa-valkey
    command: [ "valkey-server", "--save", "", "--appendonly", "no" ]
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── 4. HashiCorp Vault ───────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.19
    container_name: fatwa-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── 5. HashiCorp Consul ──────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.21
    container_name: fatwa-consul
    command: "agent -dev -ui -client=0.0.0.0"
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── 6. Grafana Tempo (Distributed Tracing) ──────────────────────────────
  tempo:
    image: grafana/tempo:2.10.7
    container_name: fatwa-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  # ── 7. Grafana Loki (Log Aggregation) ───────────────────────────────────
  loki:
    image: grafana/loki:3.7.2
    container_name: fatwa-loki
    command: [ "-config.file=/etc/loki/loki.yaml" ]
    volumes:
      - ./infra/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  # ── 8. Grafana Alloy (OTLP Collector) ──────────────────────────────────
  alloy:
    image: grafana/alloy:latest
    container_name: fatwa-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  # ── 9. Grafana (Dashboards) ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: fatwa-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  # ── 10. Fatwa API Gateway (Application) ─────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatwa-api-gateway
    environment:
      # Override config for Docker network (service names instead of localhost)
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/fatwa_db
      SPRING_FLYWAY_USER: fatwa
      SPRING_FLYWAY_PASSWORD: fatwa_secret
      HIBERNATE_REACTIVE_URL: postgresql://postgres:5432/fatwa_db
      HIBERNATE_REACTIVE_USER: fatwa
      HIBERNATE_REACTIVE_PASSWORD: fatwa_secret
      SPRING_DATA_REDIS_HOST: valkey
      SPRING_CLOUD_VAULT_HOST: vault
      SPRING_CLOUD_CONSUL_HOST: consul
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://alloy:4318/v1/traces
      MANAGEMENT_OTLP_METRICS_EXPORT_ENDPOINT: http://alloy:4318/v1/metrics
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault:
        condition: service_healthy
      consul:
        condition: service_healthy
      alloy:
        condition: service_started
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  tempo_data:
  loki_data:
  grafana_data:
